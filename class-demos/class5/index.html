<html>
  <!-- Q: What type of content goes inside the <head>? 
    Does it show up on the webpage? -->
  <!-- A: The hidden structures/elements (metadata) linked to our site, that are not in the frontend, but are still very important for our site to work like we want it to -->

  <head>
    <title>class 5 demo 😌</title>
    <link href="style.css" rel="stylesheet" />
    <script src="main.js"></script>
  </head>

  <!-- Q: What type of content goes inside the <body>? 
    Does it show up on the webpage? -->
  <!-- A: The body is where we put everything that we want our site to have visible, the frontend. It does show up. -->

  <body>
    <p>this is a paragraph</p>
    <!-- Q: What type of thing is a class? -->
    <!-- A: ATTRIBUTE - I don't know the technical name but its a grouper(?) it helps you group elements inside the same bin-->
    <!-- Q: List 2 other types of _ _ _ _ IDK THE TECHNICAL NAME_ _ _ _ _ (hint: they go in the opening tag) -->
    <!-- A: style, href, id -->
    <!-- Q: How many times can we use a class in a webpage? -->
    <!-- A: unlimited times-->
    <p class="blue">this is a second paragraph</p>
    <!-- Q: How many times can we use an id in a webpage? -->
    <!-- A: we can use IDs as many times as we want, but each id is unique and can only be used once. -->
    <p id="main">this is a third paragraph</p>

    <!-- now open up style.css -->
    <div id="container"></div>
  </body>
</html>
